<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hora do Banho! 🚿</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #140d21;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 60vh; 
            background-color: #2e2242; 
            border-bottom: 4px solid #fff;
            overflow: hidden;
        }
        .furniture {
            position: absolute;
            background: #413159;
            border: 2px solid #5a457a;
            border-radius: 4px;
        }
        #bed { width: 60px; height: 90px; top: 10px; left: 10px; }
        #bed::after { content: '🛏️'; font-size: 24px; position: absolute; top: 10px; left: 15px; }
        #rug {
            position: absolute;
            width: 140px;
            height: 100px;
            background-color: #5c3e2b;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px dashed #7c583f;
            opacity: 0.6;
            z-index: 1;
        }
        .sprite {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        /* --- BONECA DE CABELO VERMELHO E OLHO VERDE --- */
        #player {
            width: 35px;
            height: 55px;
        }
        #player::before {
            content: '';
            position: absolute;
            top: 5px; left: 2px;
            width: 31px; height: 45px;
            background-color: #d62828; 
            border-radius: 8px 8px 4px 4px;
            z-index: 1;
            box-shadow: inset -3px 0 0 #b31b1b;
        }
        .character-face {
            position: absolute;
            top: 6px; left: 6px;
            width: 23px; height: 20px;
            background-color: #ffd1b3; 
            border-radius: 4px;
            z-index: 3;
        }
        .character-face::before {
            content: ''; position: absolute; top: 6px; left: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-face::after {
            content: ''; position: absolute; top: 6px; right: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-hair-front {
            position: absolute; top: 3px; left: 4px; width: 27px; height: 8px;
            background-color: #d62828; border-radius: 4px 4px 0 0; z-index: 4;
        }
        .character-body {
            position: absolute; top: 25px; left: 6px; width: 23px; height: 22px;
            background-color: #00b4d8; border-radius: 4px 4px 2px 2px; z-index: 2;
            box-shadow: inset 0 -4px 0 #0077b6;
        }
        .character-body::after {
            content: ''; position: absolute; bottom: -5px; left: 2px; width: 19px; height: 6px;
            background-color: #1a1a1a; border-radius: 2px; box-shadow: 4px 0 0 #1a1a1a, 11px 0 0 #1a1a1a;
        }

        /* INIMIGO: SAPO */
        #frog { 
            font-size: 32px; 
            line-height: 1; 
            animation: hop 0.5s infinite alternate;
        }
        @keyframes hop {
            from { transform: translate(-50%, -50%) scaleY(1); }
            to { transform: translate(-50%, -70%) scaleY(0.9); }
        }

        /* OBJETIVO: CHUVEIRO */
        #shower {
            font-size: 36px; line-height: 1;
            filter: drop-shadow(0 0 10px #00d2ff);
        }

        /* --- CONTROLES / ANALÓGICO EM BAIXO --- */
        #controls-container {
            width: 100vw;
            height: 40vh;
            background-color: black;
            border-top: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 15px;
            box-sizing: border-box;
        }
        #dpad {
            position: relative;
            width: 130px;
            height: 130px;
            flex-shrink: 0;
        }
        .dpad-btn {
            position: absolute;
            background: #222;
            border: 3px solid white;
            color: white;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
        }
        .dpad-btn:active {
            background: white;
            color: black;
        }
        #btn-up    { top: 0; left: 45px; width: 40px; height: 40px; }
        #btn-down  { bottom: 0; left: 45px; width: 40px; height: 40px; }
        #btn-left  { top: 45px; left: 0; width: 40px; height: 40px; }
        #btn-right { top: 45px; right: 0; width: 40px; height: 40px; }

        #text-box {
            width: 60%;
            height: 110px;
            border: 2px solid white;
            padding: 10px;
            font-size: 14px;
            overflow-y: auto;
            background: #111;
            line-height: 1.4;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; display: none;
        }
        .btn {
            background: white; color: black; border: 2px solid white; padding: 10px 20px;
            font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase;
            margin-top: 15px;
        }
    </style>
</head>
