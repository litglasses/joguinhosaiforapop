<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hora do Banho! 🚿</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #140d21;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 50vh; 
            background-color: #2e2242; 
            border-bottom: 4px solid #fff;
            overflow: hidden;
        }
        .furniture {
            position: absolute;
            background: #413159;
            border: 2px solid #5a457a;
            border-radius: 4px;
        }
        #bed { width: 60px; height: 90px; top: 10px; left: 10px; }
        #bed::after { content: '🛏️'; font-size: 24px; position: absolute; top: 10px; left: 15px; }
        #rug {
            position: absolute;
            width: 140px;
            height: 100px;
            background-color: #5c3e2b;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px dashed #7c583f;
            opacity: 0.6;
            z-index: 1;
        }
        .sprite {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        /* --- MENINA DE CABELO VERMELHO E OLHO VERDE --- */
        #player {
            width: 35px;
            height: 55px;
        }
        #player::before {
            content: '';
            position: absolute;
            top: 5px; left: 2px;
            width: 31px; height: 45px;
            background-color: #d62828; 
            border-radius: 8px 8px 4px 4px;
            z-index: 1;
            box-shadow: inset -3px 0 0 #b31b1b;
        }
        .character-face {
            position: absolute;
            top: 6px; left: 6px;
            width: 23px; height: 20px;
            background-color: #ffd1b3; 
            border-radius: 4px;
            z-index: 3;
        }
        .character-face::before {
            content: ''; position: absolute; top: 6px; left: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-face::after {
            content: ''; position: absolute; top: 6px; right: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-hair-front {
            position: absolute; top: 3px; left: 4px; width: 27px; height: 8px;
            background-color: #d62828; border-radius: 4px 4px 0 0; z-index: 4;
        }
        .character-body {
            position: absolute; top: 25px; left: 6px; width: 23px; height: 22px;
            background-color: #00b4d8; border-radius: 4px 4px 2px 2px; z-index: 2;
            box-shadow: inset 0 -4px 0 #0077b6;
        }
        .character-body::after {
            content: ''; position: absolute; bottom: -5px; left: 2px; width: 19px; height: 6px;
            background-color: #1a1a1a; border-radius: 2px; box-shadow: 4px 0 0 #1a1a1a, 11px 0 0 #1a1a1a;
        }

        /* SAPO INIMIGO */
        #frog { 
            font-size: 32px; 
            line-height: 1; 
            animation: hop 0.5s infinite alternate;
        }
        @keyframes hop {
            from { transform: translate(-50%, -50%) scaleY(1); }
            to { transform: translate(-50%, -70%) scaleY(0.9); }
        }

        /* CHUVEIRO */
        #shower {
            font-size: 36px; line-height: 1;
            filter: drop-shadow(0 0 10px #00d2ff);
        }

        /* --- CONTROLES / ANALÓGICO (D-PAD) --- */
        #controls-container {
            width: 100vw;
            height: 30vh;
            background-color: black;
            border-top: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px;
            box-sizing: border-box;
        }
        #dpad {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .dpad-btn {
            position: absolute;
            background: #222;
            border: 3px solid white;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .dpad-btn:active {
            background: white;
            color: black;
        }
        #btn-up    { top: 0; left: 40px; width: 40px; height: 40px; }
        #btn-down  { bottom: 0; left: 40px; width: 40px; height: 40px; }
        #btn-left  { top: 40px; left: 0; width: 40px; height: 40px; }
        #btn-right { top: 40px; right: 0; width: 40px; height: 40px; }

        #text-box {
            width: 50%;
            height: 100px;
            border: 2px solid white;
            padding: 8px;
            font-size: 13px;
            overflow-y: auto;
            background: #111;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; display: none;
        }
        .btn {
            background: white; color: black; border: 2px solid white; padding: 10px 20px;
            font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="furniture" id="bed"></div>
        <div id="rug"></div>
        
        <div id="player" class="sprite">
            <div class="character-hair-front"></div>
            <div class="character-face"></div>
            <div class="character-body"></div>
        </div>
        
        <div id="frog" class="sprite">🐸</div>
        <div id="shower" class="sprite">🚿🚿</div>
        
        <div id="win-screen" class="screen">
            <h2 style="color: #00ff66; margin-bottom: 20px; font-size: 24px; font-weight: bold;">VITÓRIA! 🚿</h2>
            <p style="font-size: 22px; margin-bottom: 30px; color: #fff; line-height: 1.6; font-weight: bold;">
                muito bem menina, matt vai apanha
            </p>
            <button class="btn" onclick="resetGame()">Jogar de Novo</button>
        </div>
