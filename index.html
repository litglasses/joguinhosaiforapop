<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resgate o Cinnamoroll! ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #140d21;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 50vh; /* Ajustado para dar espaço ao analógico */
            background-color: #2e2242; 
            border-bottom: 4px solid #fff;
            overflow: hidden;
        }
        .furniture {
            position: absolute;
            background: #413159;
            border: 2px solid #5a457a;
            border-radius: 4px;
        }
        #bed { width: 60px; height: 90px; top: 10px; left: 10px; }
        #bed::after { content: '🛏️'; font-size: 24px; position: absolute; top: 10px; left: 15px; }
        #rug {
            position: absolute;
            width: 140px;
            height: 100px;
            background-color: #5c3e2b;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px dashed #7c583f;
            opacity: 0.6;
            z-index: 1;
        }
        .sprite {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        /* --- MENINA DE CABELO VERMELHO E OLHO VERDE --- */
        #player {
            width: 35px;
            height: 55px;
        }
        #player::before {
            content: '';
            position: absolute;
            top: 5px; left: 2px;
            width: 31px; height: 45px;
            background-color: #d62828; 
            border-radius: 8px 8px 4px 4px;
            z-index: 1;
            box-shadow: inset -3px 0 0 #b31b1b;
        }
        .character-face {
            position: absolute;
            top: 6px; left: 6px;
            width: 23px; height: 20px;
            background-color: #ffd1b3; 
            border-radius: 4px;
            z-index: 3;
        }
        .character-face::before {
            content: ''; position: absolute; top: 6px; left: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-face::after {
            content: ''; position: absolute; top: 6px; right: 4px; width: 4px; height: 5px;
            background-color: #00ff66; border-bottom: 2px solid #004d1a;
        }
        .character-hair-front {
            position: absolute; top: 3px; left: 4px; width: 27px; height: 8px;
            background-color: #d62828; border-radius: 4px 4px 0 0; z-index: 4;
        }
        .character-body {
            position: absolute; top: 25px; left: 6px; width: 23px; height: 22px;
            background-color: #00b4d8; border-radius: 4px 4px 2px 2px; z-index: 2;
            box-shadow: inset 0 -4px 0 #0077b6;
        }
        .character-body::after {
            content: ''; position: absolute; bottom: -5px; left: 2px; width: 19px; height: 6px;
            background-color: #1a1a1a; border-radius: 2px; box-shadow: 4px 0 0 #1a1a1a, 11px 0 0 #1a1a1a;
        }

        #cat { font-size: 32px; line-height: 1; }
        #toy {
            font-size: 36px; line-height: 1;
            filter: drop-shadow(0 0 10px #00d2ff);
            animation: bounce 0.8s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -65%) scale(1.1); }
        }

        /* --- CONTROLES / ANALÓGICO (D-PAD) --- */
        #controls-container {
            width: 100vw;
            height: 30vh;
            background-color: black;
            border-top: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px;
            box-sizing: border-box;
        }
        #dpad {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .dpad-btn {
            position: absolute;
            background: #222;
            border: 3px solid white;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .dpad-btn:active {
            background: white;
            color: black;
        }
        #btn-up    { top: 0; left: 40px; width: 40px; height: 40px; }
        #btn-down  { bottom: 0; left: 40px; width: 40px; height: 40px; }
        #btn-left  { top: 40px; left: 0; width: 40px; height: 40px; }
        #btn-right { top: 40px; right: 0; width: 40px; height: 40px; }

        #text-box {
            width: 50%;
            height: 100px;
            border: 2px solid white;
            padding: 8px;
            font-size: 13px;
            overflow-y: auto;
            background: #111;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; display: none;
        }
        .btn {
            background: white; color: black; border: 2px solid white; padding: 10px 20px;
            font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="furniture" id="bed"></div>
        <div id="rug"></div>
        
        <div id="player" class="sprite">
            <div class="character-hair-front"></div>
            <div class="character-face"></div>
            <div class="character-body"></div>
        </div>
        
        <div id="cat" class="sprite">🐈⚡</div>
        <div id="toy" class="sprite">☁️</div>
        
        <!-- Tela de Vitória -->
        <div id="win-screen" class="screen">
            <h2 style="color: #ff3366; margin-bottom: 20px; font-size: 24px;">VOCÊ CONSEGUIU! 🎉</h2>
            <p style="font-size: 20px; margin-bottom: 30px; color: #fff; line-height: 1.6;">
                Te amo linda de cabelo vermelho ❤️
            </p>
            <button class="btn" onclick="resetGame()">Jogar de Novo</button>
        </div>

        <!-- Tela de Game Over -->
        <div id="lose-screen" class="screen">
            <h2 style="color: #ff3333; margin-bottom: 20px; font-size: 24px;">GAME OVER 🐾</h2>
            <p style="margin-bottom: 20px;">O gatinho laranja te pegou!</p>
            <button class="btn" onclick="resetGame()">Tentar de Novo</button>
        </div>
    </div>

    <!-- Seção de baixo com Analógico e Diálogo estilo RPG -->
    <div id="controls-container">
        <div id="dpad">
            <div class="dpad-btn" id="btn-up">▲</div>
            <div class="dpad-btn" id="btn-down">▼</div>
            <div class="dpad-btn" id="btn-left">◀</div>
            <div class="dpad-btn" id="btn-right">▶</div>
        </div>
        <div id="text-box">* Use o analógico ao lado para andar.<br>* Fuja do gato e pegue o Cinnamoroll!</div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const cat = document.getElementById('cat');
        const toy = document.getElementById('toy');
        const textBox = document.getElementById('text-box');
        const winScreen = document.getElementById('win-screen');
        const loseScreen = document.getElementById('lose-screen');

        let pX, pY, cX, cY, tX, tY;
        let gameActive = true;
        let catSpeed = 1.9; // Velocidade equilibrada para o analógico
        let playerSpeed = 4.5; // Velocidade de movimento da personagem

        // Estados dos botões do analógico
        let moveKeys = { up: false, down: false, left: false, right: false };

        function initPositions() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            pX = w * 0.2; pY = h * 0.5; 
            cX = w * 0.8; cY = h * 0.8; 
            tX = w * 0.8; tY = h * 0.2;
            updatePositions();
        }

        function updatePositions() {
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';
            cat.style.left = cX + 'px';
            cat.style.top = cY + 'px';
            toy.style.left = tX + 'px';
            toy.style.top = tY + 'px';
        }

        // Vincular botões do analógico (Funciona em Toque e Mouse)
        const setupBtn = (id, direction) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); moveKeys[direction] = true; };
            const end = (e) => { e.preventDefault(); moveKeys[direction] = false; };
            
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        };

        setupBtn('btn-up', 'up');
        setupBtn('btn-down', 'down');
        setupBtn('btn-left', 'left');
        setupBtn('btn-right', 'right');

        // Loop principal
        function gameLoop() {
            if (!gameActive) return;

            // Movimentação do Jogador baseada no analógico ativo
            if (moveKeys.up) pY -= playerSpeed;
            if (moveKeys.down) pY += playerSpeed;
            if (moveKeys.left) pX -= playerSpeed;
            if (moveKeys.right) pX += playerSpeed;

            // Limites das paredes do quarto
            pX = Math.max(20, Math.min(container.clientWidth - 20, pX));
            pY = Math.max(25, Math.min(container.clientHeight - 25, pY));

            // IA do Gato seguindo a jogadora
            let dx = pX - cX;
            let dy = pY - cY;
            let distanceToPlayer = Math.sqrt(dx * dx + dy * dy);

            if (distanceToPlayer > 5) {
                cX += (dx / distanceToPlayer) * catSpeed;
                cY += (dy / distanceToPlayer) * catSpeed;
            }

            updatePositions();

            // Colisões
            if (distanceToPlayer < 28) {
                gameActive = false;
                loseScreen.style.display = 'flex';
                textBox.innerHTML = "* O gatinho te alcançou...";
            }

            let txDiff = pX - tX;
            let tyDiff = pY - tY;
            let distanceToToy = Math.sqrt(txDiff * txDiff + tyDiff * tyDiff);

            if (distanceToToy < 32) {
                gameActive = false;
                winScreen.style.display = 'flex';
                textBox.innerHTML = "* Você pegou o Cinnamoroll! ❤️";
            }

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            winScreen.style.display = 'none';
            loseScreen.style.display = 'none';
            textBox.innerHTML = "* Fuja do gatinho e pegue a pelúcia!";
            gameActive = true;
            moveKeys = { up: false, down: false, left: false, right: false };
            initPositions();
            requestAnimationFrame(gameLoop);
        }

        window.onload = () => {
            initPositions();
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
